<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor">
  <!-- Anvil base -->
  <rect x="4" y="26" width="24" height="3" rx="0.5" />
  <polygon points="7,26 10,22 22,22 25,26" />
  <rect x="12" y="18" width="8" height="4" />
  <!-- Anvil horn (left) -->
  <polygon points="12,20 7,19 7,21" />
  <!-- Clapperboard top -->
  <rect x="9" y="10" width="14" height="8" rx="1" />
  <!-- Clapperboard stripes -->
  <rect x="9" y="10" width="3.5" height="8" fill="currentColor" opacity="0.3" />
  <rect x="16" y="10" width="3.5" height="8" fill="currentColor" opacity="0.3" />
  <!-- Clapperboard hinge clapper arm -->
  <rect x="8" y="9" width="16" height="2" rx="0.5" />
  <!-- Clapper stick (angled) -->
  <rect x="8" y="6" width="16" height="2" rx="0.5" transform="rotate(-12, 8, 7)" />
  <!-- Film strip perforations (left side) -->
  <rect x="6" y="11" width="1.5" height="1" rx="0.3" opacity="0.5" />
  <rect x="6" y="14" width="1.5" height="1" rx="0.3" opacity="0.5" />
  <rect x="6" y="17" width="1.5" height="1" rx="0.3" opacity="0.5" />
  <!-- Film strip perforations (right side) -->
  <rect x="24.5" y="11" width="1.5" height="1" rx="0.3" opacity="0.5" />
  <rect x="24.5" y="14" width="1.5" height="1" rx="0.3" opacity="0.5" />
  <rect x="24.5" y="17" width="1.5" height="1" rx="0.3" opacity="0.5" />
</svg>
